<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উইকিপিডিয়া.পাতা.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { zinc: { 850: '#202022', 950: '#0c0c0e' } }
                }
            }
        }
    </script>
    <style>
        .glass { @apply bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-zinc-200 dark:border-white/5; }
        ::-webkit-scrollbar { width: 5px; }
        .dark ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        /* Simple skeleton loading animation */
        .skeleton { @apply animate-pulse bg-zinc-200 dark:bg-zinc-800 rounded; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased pb-24 md:pb-0">

    <nav class="sticky top-0 z-50 h-16 border-b glass flex items-center px-6 justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-zinc-900 dark:bg-white rounded-lg flex items-center justify-center">
                <span class="text-lg text-white dark:text-black font-bold">উ</span>
            </div>
            <span class="font-bold hidden sm:block">উইকিপিডিয়া</span>
        </div>
        <button id="themeToggle" class="p-2 rounded-xl bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <div class="max-w-[1600px] mx-auto flex">
        
        <aside class="hidden lg:flex flex-col w-64 h-[calc(100vh-64px)] sticky top-16 p-6 gap-8 border-r border-zinc-200 dark:border-zinc-800">
             <div class="space-y-2">
                <p class="text-xs font-bold text-zinc-500 uppercase px-3 mb-4">মেনু</p>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-500/10 text-blue-500 font-medium">প্রধান পাতা</a>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                
                <div class="xl:col-span-8 space-y-8">
                    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-[2rem] overflow-hidden">
                        
                        <div class="h-64 sm:h-96 relative bg-zinc-200 dark:bg-zinc-800">
                            <img id="featured-image" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex items-end p-8">
                                <div>
                                    <span id="featured-category" class="px-3 py-1 bg-blue-500 text-white text-xs font-bold rounded-lg mb-3 inline-block hidden"></span>
                                    <h1 id="featured-title" class="text-3xl sm:text-4xl font-bold text-white skeleton w-64 h-10"></h1>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-8">
                            <p id="featured-excerpt" class="text-lg leading-relaxed mb-6 skeleton w-full h-24 text-zinc-700 dark:text-zinc-300"></p>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-4 space-y-6">
                    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-6">
                        <h3 class="font-bold mb-4 border-b border-zinc-200 dark:border-zinc-800 pb-2">সাম্প্রতিক নিবন্ধ</h3>
                        
                        <div id="sidebar-articles" class="space-y-4">
                            <div class="flex gap-4 skeleton h-16 w-full rounded-2xl"></div>
                            <div class="flex gap-4 skeleton h-16 w-full rounded-2xl"></div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        // ==========================================
        // 1. INITIALIZE SUPABASE
        // Replace these with your actual Supabase credentials
        // ==========================================
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. FETCH AND RENDER DATA
        // ==========================================
        async function fetchArticles() {
            try {
                // Fetch the 5 most recent articles
                const { data: articles, error } = await supabase
                    .from('articles')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error) throw error;

                if (articles && articles.length > 0) {
                    renderFeaturedArticle(articles[0]);
                    
                    if (articles.length > 1) {
                        renderSidebarArticles(articles.slice(1));
                    } else {
                        document.getElementById('sidebar-articles').innerHTML = '<p class="text-sm text-zinc-500">আরও কোনো নিবন্ধ নেই।</p>';
                    }
                }
            } catch (error) {
                console.error('Error fetching data from Supabase:', error.message);
                document.getElementById('featured-title').textContent = "ডেটা লোড করতে সমস্যা হয়েছে";
                document.getElementById('featured-title').classList.remove('skeleton');
            }
        }

        // ==========================================
        // 3. UPDATE DOM ELEMENTS
        // ==========================================
        function renderFeaturedArticle(article) {
            const titleEl = document.getElementById('featured-title');
            const excerptEl = document.getElementById('featured-excerpt');
            const imageEl = document.getElementById('featured-image');
            const categoryEl = document.getElementById('featured-category');

            // Remove skeletons
            titleEl.classList.remove('skeleton', 'w-64', 'h-10');
            excerptEl.classList.remove('skeleton', 'w-full', 'h-24');

            // Inject Data
            titleEl.textContent = article.title;
            excerptEl.textContent = article.excerpt;
            
            if (article.category) {
                categoryEl.textContent = article.category;
                categoryEl.classList.remove('hidden');
            }

            if (article.image_url) {
                imageEl.src = article.image_url;
                imageEl.onload = () => imageEl.classList.remove('opacity-0');
            }
        }

        function renderSidebarArticles(articles) {
            const container = document.getElementById('sidebar-articles');
            container.innerHTML = ''; // Clear skeletons

            articles.forEach(article => {
                const articleHTML = `
                    <div class="flex items-center gap-4 p-2 hover:bg-zinc-50 dark:hover:bg-zinc-800/50 rounded-2xl transition-colors cursor-pointer group">
                        <div class="w-16 h-16 rounded-xl bg-zinc-200 dark:bg-zinc-800 overflow-hidden flex-shrink-0">
                            <img src="${article.image_url || 'https://via.placeholder.com/100'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
                        </div>
                        <div>
                            <p class="font-bold text-sm line-clamp-1 group-hover:text-blue-500 transition-colors">${article.title}</p>
                            <p class="text-xs text-zinc-500 mt-1">${article.category || 'সাধারণ'}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', articleHTML);
            });
        }

        // Execute fetch on load
        fetchArticles();
    </script>
</body>
</html>
