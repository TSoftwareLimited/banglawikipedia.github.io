<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিভাগসমূহ - উইকিপিডিয়া.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { zinc: { 850: '#202022', 950: '#0c0c0e' } }
                }
            }
        }
    </script>
    <style>
        .glass { @apply bg-white/70 dark:bg-zinc-950/70 backdrop-blur-3xl border-zinc-200/50 dark:border-white/10; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton { 
            @apply rounded-xl;
            background: linear-gradient(90deg, #e4e4e7 25%, #f4f4f5 50%, #e4e4e7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 h-16 border-b glass flex items-center px-4 lg:px-6 justify-between transition-colors duration-300">
        <div class="flex items-center gap-3">
            <button id="mobileMenuBtn" class="lg:hidden p-2 -ml-2 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900 rounded-lg transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div onclick="window.location.href='index.html'" class="flex items-center gap-3 cursor-pointer">
                <div class="w-9 h-9 bg-zinc-900 dark:bg-white rounded-xl flex items-center justify-center transition-colors">
                    <span class="text-lg text-white dark:text-black font-bold">উ</span>
                </div>
                <span class="font-bold text-lg hidden sm:block text-zinc-900 dark:text-white">উইকিপিডিয়া<span class="text-zinc-500">.বাংলা</span></span>
            </div>
        </div>

        <div class="flex-1 max-w-xl mx-4 lg:mx-8 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="globalSearchInput" placeholder="কী খুঁজতে চান?..." class="w-full bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all text-zinc-900 dark:text-zinc-100 placeholder-zinc-500">
        </div>

        <button id="themeToggle" class="p-2.5 rounded-xl bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-blue-500 transition-colors">
            <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <div class="max-w-[1600px] mx-auto flex">
        <!-- Mobile Backdrop -->
        <div id="sidebarBackdrop" class="fixed inset-0 bg-black/50 z-[55] hidden lg:hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-[60] w-72 bg-zinc-50 dark:bg-zinc-950 transform -translate-x-full transition-transform duration-300 lg:relative lg:translate-x-0 lg:flex lg:flex-col lg:w-64 lg:h-[calc(100vh-64px)] lg:sticky lg:top-16 p-6 gap-8 border-r border-zinc-200 dark:border-zinc-800 overflow-y-auto">
            <div class="space-y-2">
                <p class="text-xs font-bold text-zinc-400 uppercase px-3 mb-4 tracking-wider">মেনু</p>
                <a href="index.html" id="nav-home" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    প্রধান পাতা
                </a>
                <a href="categories.html" id="nav-categories" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                    বিভাগসমূহ
                </a>
                <a href="javascript:void(0)" id="sidebar-random-btn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    অজানা নিবন্ধ
                </a>
                <a href="#" id="nav-community-portal" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    সম্প্রদায় প্রবেশদ্বার
                </a>
            </div>
            <div class="space-y-2">
                <p class="text-xs font-bold text-zinc-400 uppercase px-3 mb-4 tracking-wider">ব্যবহারকারী</p>
                <a href="javascript:void(0)" id="sidebarContributeBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    অবদান রাখুন
                </a>
                <a href="javascript:void(0)" id="sidebarLoginBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    প্রবেশ করুন
                </a>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-12">
            <div class="mb-10 space-y-2">
                <h1 class="text-4xl font-black text-zinc-900 dark:text-white">সকল বিভাগ</h1>
                <p class="text-zinc-500">বিষয় অনুযায়ী আমাদের নিবন্ধগুলো খুঁজে দেখুন।</p>
            </div>

            <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
                <div class="h-32 skeleton"></div>
            </div>

            <div id="categories-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Categories will be injected here -->
            </div>

            <div id="no-data" class="hidden text-center py-20 space-y-4">
                <div class="w-20 h-20 bg-zinc-100 dark:bg-zinc-900 rounded-full flex items-center justify-center mx-auto text-zinc-400">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                </div>
                <p class="text-zinc-500">কোনো বিভাগ খুঁজে পাওয়া যায়নি।</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const user = JSON.parse(localStorage.getItem('wiki_user'));

        // Sidebar logic
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebarBackdrop');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            backdrop.classList.toggle('hidden');
            document.body.classList.toggle('overflow-hidden');
        }

        if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if (backdrop) backdrop.addEventListener('click', toggleSidebar);
        
        document.getElementById('nav-categories')?.classList.add('bg-blue-500/10', 'text-blue-600', 'dark:text-blue-400', 'font-medium');
        
        const sidebarContributeBtn = document.getElementById('sidebarContributeBtn');
        if (sidebarContributeBtn) {
            sidebarContributeBtn.onclick = () => {
                if (user) window.location.href = 'create-article.html';
                else showToast('নিবন্ধ তৈরি করতে অনুগ্রহ করে আগে প্রবেশ করুন।', 'info');
            };
        }

        const sidebarLoginBtn = document.getElementById('sidebarLoginBtn');
        if (user && sidebarLoginBtn) {
            sidebarLoginBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> প্রস্থান করুন`;
            sidebarLoginBtn.onclick = () => { localStorage.removeItem('wiki_user'); window.location.reload(); };
        } else if (sidebarLoginBtn) {
            sidebarLoginBtn.onclick = () => { window.location.href = 'index.html'; };
        }

        const randomBtn = document.getElementById('sidebar-random-btn');
        if (randomBtn) {
            randomBtn.onclick = async () => {
                const { data } = await supabase.from('articles').select('slug');
                if (data && data.length > 0) window.location.href = `article.html?slug=${data[Math.floor(Math.random() * data.length)].slug}`;
            };
        }

        // Toast Logic
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-10 opacity-0 glass border pointer-events-auto`;
            
            let icon = '';
            let textColor = '';
            if (type === 'success') {
                icon = '<svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                textColor = 'text-emerald-600 dark:text-emerald-400';
            } else if (type === 'error') {
                icon = '<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                textColor = 'text-red-600 dark:text-red-400';
            } else {
                icon = '<svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                textColor = 'text-blue-600 dark:text-blue-400';
            }

            toast.innerHTML = `
                <div class="flex-shrink-0">${icon}</div>
                <p class="font-bold text-sm ${textColor}">${message}</p>
            `;

            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function updateAuthUI() {
            if (user) {
                const themeToggle = document.getElementById('themeToggle');
                if (themeToggle) {
                    themeToggle.onclick = () => applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
                }
            }
        }

        // Global Theme Management
        async function applyTheme(theme, persist = true) {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            
            const isDark = document.documentElement.classList.contains('dark');
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.innerHTML = isDark 
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }

            if (persist) {
                if (user) {
                    user.theme_preference = theme;
                    localStorage.setItem('wiki_user', JSON.stringify(user));
                    await supabase.from('site_users').update({ theme_preference: theme }).eq('id', user.id);
                } else {
                    localStorage.setItem('theme', theme);
                }
            }
        }

        const searchInput = document.getElementById('globalSearchInput');
        searchInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) window.location.href = `index.html?q=${encodeURIComponent(query)}`;
            }
        };

        async function fetchCategories() {
            try {
                // We fetch all unique categories from the articles table
                const { data: articles, error, status } = await supabase
                    .from('articles')
                    .select('category');

                if (error) {
                    console.error('Supabase fetch error:', error);
                    throw error;
                }

                const counts = (articles || []).reduce((acc, a) => {
                    const cat = a.category || 'সাধারণ';
                    acc[cat] = (acc[cat] || 0) + 1;
                    return acc;
                }, {});

                const categoryData = Object.keys(counts).map(name => ({
                    name,
                    count: counts[name]
                }));
                
                document.getElementById('loading').classList.add('hidden');
                if (categoryData.length > 0) {
                    renderCategories(categoryData);
                } else {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('no-data').classList.remove('hidden');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('no-data').classList.remove('hidden');
            }
        }

        function renderCategories(categories) {
            const grid = document.getElementById('categories-grid');
            grid.classList.remove('hidden');
            grid.classList.add('grid');

            const colors = [
                'from-blue-500 to-indigo-600',
                'from-purple-500 to-pink-600',
                'from-emerald-500 to-teal-600',
                'from-orange-500 to-red-600',
                'from-amber-500 to-orange-600',
                'from-cyan-500 to-blue-600'
            ];

            grid.innerHTML = categories.map((cat, index) => {
                const gradient = colors[index % colors.length];
                return `
                    <div onclick="window.location.href='index.html?category=${encodeURIComponent(cat.name)}'" class="group relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-6 hover:shadow-xl hover:shadow-blue-500/5 transition-all cursor-pointer overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${gradient} opacity-5 group-hover:opacity-10 transition-opacity rounded-full -mr-16 -mt-16"></div>
                        
                        <div class="relative space-y-4">
                            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${gradient} flex items-center justify-center text-white shadow-lg">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-zinc-900 dark:text-white">${cat.name}</h3>
                                <p class="text-sm text-zinc-500 mt-1">${cat.count}টি নিবন্ধ</p>
                            </div>
                            <div class="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-bold text-xs uppercase tracking-widest pt-2 group-hover:gap-3 transition-all">
                                প্রবেশ করুন
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Init
        const initialTheme = user?.theme_preference || localStorage.getItem('theme') || 'dark';
        applyTheme(initialTheme, false);
        updateAuthUI();
        fetchCategories();

    </script>
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex flex-col gap-3 z-[300] w-full max-w-md px-4 pointer-events-none"></div>
</body>
</html>
