<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধ - উইকিপিডিয়া.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { zinc: { 850: '#202022', 950: '#0c0c0e' } }
                }
            }
        }
    </script>
    <style>
        .glass { @apply bg-white/70 dark:bg-zinc-950/70 backdrop-blur-3xl border-zinc-200/50 dark:border-white/10; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton { 
            @apply rounded-xl;
            background: linear-gradient(90deg, #e4e4e7 25%, #f4f4f5 50%, #e4e4e7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 h-16 border-b glass flex items-center px-4 lg:px-6 justify-between">
        <div onclick="window.location.href='index.html'" class="flex items-center gap-3 cursor-pointer">
            <div class="w-9 h-9 bg-zinc-900 dark:bg-white rounded-xl flex items-center justify-center">
                <span class="text-lg text-white dark:text-black font-bold">উ</span>
            </div>
            <span class="font-bold text-lg text-zinc-900 dark:text-white">উইকিপিডিয়া<span class="text-zinc-500">.বাংলা</span></span>
        </div>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 text-sm font-medium bg-zinc-100 dark:bg-zinc-900 rounded-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">ফিরে যান</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6 lg:p-12 pb-24">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4 border-b border-zinc-200 dark:border-zinc-800 pb-0">
            <div class="flex items-center gap-1">
                <button id="tab-article" class="px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all">নিবন্ধ</button>
                <button id="tab-talk" class="px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">আলাপ</button>
            </div>
            <div class="flex items-center gap-1 mb-2 sm:mb-0">
                <button class="px-3 py-1.5 text-xs font-bold bg-zinc-100 dark:bg-zinc-900 rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">পড়ুন</button>
                <button class="px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">সম্পাদনা</button>
                <button class="px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">ইতিহাস</button>
            </div>
        </div>

        <div id="loading" class="space-y-8">
            <div class="h-64 sm:h-[400px] skeleton w-full"></div>
            <div class="h-14 skeleton w-3/4"></div>
            <div class="space-y-4">
                <div class="h-4 skeleton w-full"></div>
                <div class="h-4 skeleton w-full"></div>
                <div class="h-4 skeleton w-5/6"></div>
            </div>
        </div>

        <article id="content-area" class="hidden space-y-10">
            <div class="relative rounded-3xl overflow-hidden shadow-2xl h-64 sm:h-[450px]">
                <img id="article-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950/80 to-transparent"></div>
            </div>

            <div class="space-y-6">
                <span id="article-category" class="px-4 py-1.5 bg-blue-600 text-white text-[10px] uppercase tracking-widest font-black rounded-full"></span>
                <h1 id="article-title" class="text-4xl sm:text-6xl font-black text-zinc-900 dark:text-white leading-tight"></h1>
                <div class="flex items-center gap-4 text-sm text-zinc-500 font-medium pb-8 border-b border-zinc-200 dark:border-zinc-800">
                    <span id="article-date"></span>
                    <span>•</span>
                    <span>উইকিপিডিয়া সম্পাদক</span>
                </div>
            </div>

            <div id="article-body" class="text-xl lg:text-2xl leading-[1.8] text-zinc-700 dark:text-zinc-300 font-light prose dark:prose-invert max-w-none">
                <!-- Article content -->
            </div>
        </article>

        <section id="talk-area" class="hidden space-y-10 animate-in fade-in duration-500">
            <div class="space-y-4">
                <h2 class="text-3xl font-black text-zinc-900 dark:text-white">আলোচনা পাতা</h2>
                <p class="text-zinc-500">এই নিবন্ধটি উন্নত করার বিষয়ে আপনার মতামত দিন।</p>
            </div>

            <div class="bg-white dark:bg-zinc-900/60 border border-zinc-200 dark:border-zinc-800/60 rounded-3xl p-6 space-y-4 backdrop-blur-md">
                <textarea id="comment-body" placeholder="আপনার মন্তব্য লিখুন..." rows="4" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
                <div class="relative">
                    <div id="mention-dropdown-main" class="absolute bottom-full left-0 w-full max-w-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-2xl hidden z-50 mb-2 overflow-hidden border-b-0 animate-in slide-in-from-bottom-2 duration-200"></div>
                    <textarea id="comment-body" oninput="handleMentionSearch(event, 'main')" placeholder="আপনার মন্তব্য লিখুন..." rows="4" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
                </div>
                <button id="submit-comment" class="w-full sm:w-auto px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">মন্তব্য জমা দিন</button>
            </div>

            <div id="comments-list" class="space-y-6 pt-6"></div>
        </section>

        <div id="error-area" class="hidden text-center py-20 space-y-6">
            <h2 class="text-3xl font-bold">নিবন্ধটি খুঁজে পাওয়া যায়নি</h2>
            <p class="text-zinc-500">সম্ভবত আইডি ভুল বা নিবন্ধটি মুছে ফেলা হয়েছে।</p>
            <button onclick="window.location.href='index.html'" class="px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-500/20">মূল পাতায় ফিরে যান</button>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex flex-col gap-3 z-[300] w-full max-w-md px-4 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Init Theme from storage/user
        const user = JSON.parse(localStorage.getItem('wiki_user'));
        const savedTheme = user?.theme_preference || localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');

        // Toast Logic
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-10 opacity-0 glass border pointer-events-auto`;
            
            let icon = '';
            let textColor = '';
            if (type === 'success') {
                icon = '<svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                textColor = 'text-emerald-600 dark:text-emerald-400';
            } else if (type === 'error') {
                icon = '<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                textColor = 'text-red-600 dark:text-red-400';
            } else {
                icon = '<svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                textColor = 'text-blue-600 dark:text-blue-400';
            }

            toast.innerHTML = `
                <div class="flex-shrink-0">${icon}</div>
                <p class="font-bold text-sm ${textColor}">${message}</p>
            `;

            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        // Tab Switching Logic
        const tabArticle = document.getElementById('tab-article');
        const tabTalk = document.getElementById('tab-talk');
        const contentArea = document.getElementById('content-area');
        const talkArea = document.getElementById('talk-area');

        tabArticle.onclick = () => {
            tabArticle.className = 'px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all';
            tabTalk.className = 'px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors';
            contentArea.classList.remove('hidden');
            talkArea.classList.add('hidden');
        };

        tabTalk.onclick = () => {
            tabTalk.className = 'px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all';
            tabArticle.className = 'px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors';
            contentArea.classList.add('hidden');
            talkArea.classList.remove('hidden');
            fetchComments();
        };

        function generateAvatarHtml(authorName, profilePicUrl) {
            if (profilePicUrl) {
                return `<img src="${profilePicUrl}" class="w-10 h-10 rounded-full object-cover shadow-inner flex-shrink-0 ring-2 ring-white dark:ring-zinc-800">`;
            }
            const initial = (authorName || '').charAt(0).toUpperCase() || 'U';
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-indigo-500', 'bg-rose-500'];
            const hash = (authorName || '').split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const color = colors[hash % colors.length];
            return `<div class="w-10 h-10 rounded-full ${color} flex items-center justify-center text-white text-lg font-bold shadow-inner flex-shrink-0 ring-2 ring-white dark:ring-zinc-800">${initial}</div>`;
        }

        function formatContentWithMentions(content) {
            if (!content) return '';
            // @username খুঁজে বের করে সেটিকে প্রোফাইল লিঙ্কে রূপান্তর করে
            return content.replace(/@(\w+)/g, '<a href="profile.html?username=$1" class="text-blue-600 font-bold hover:underline">@$1</a>');
        }

        // Talk Section Functions
        async function fetchComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div class="skeleton h-20 w-full mb-4"></div><div class="skeleton h-20 w-full"></div>';
            
            try {
                // Fetch comments with user profile data
                const { data, error } = await supabase
                    .from('comments')
                    .select('*, site_users(profile_pic_url, username), comment_replies(*, site_users(profile_pic_url, username))')
                    .eq('article_slug', slug)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    list.innerHTML = '<div class="text-center py-10"><p class="text-zinc-500">এখনও কোনো আলোচনা শুরু হয়নি। প্রথম মন্তব্যটি আপনি করুন!</p></div>';
                    return;
                }

                list.innerHTML = data.map(c => `
                    <div class="flex gap-4 p-5 bg-white dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-800 rounded-[1.5rem] shadow-sm transition-all hover:shadow-md">
                        ${generateAvatarHtml(c.author, c.site_users?.profile_pic_url)}
                        <div class="flex-1 space-y-1">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-sm text-zinc-900 dark:text-white hover:text-blue-600 cursor-pointer transition-colors">${c.author}</span>
                                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">${new Date(c.created_at).toLocaleDateString('bn-BD')}</span>
                            </div>
                            <p class="text-sm sm:text-base text-zinc-700 dark:text-zinc-300 leading-relaxed">${formatContentWithMentions(c.content)}</p>
                            <div class="flex gap-4 pt-2">
                                <button class="text-[10px] font-black text-zinc-500 hover:text-blue-600 uppercase tracking-widest">লাইক</button>
                                <button onclick="toggleReplyForm('${c.id}', '${c.site_users?.username || ''}')" class="text-[10px] font-black text-zinc-500 hover:text-blue-600 uppercase tracking-widest">উত্তর দিন</button>
                            </div>

                            <!-- Reply Form (Hidden by default) -->
                            <div id="reply-form-${c.id}" class="hidden mt-4 space-y-3">
                                <textarea id="reply-input-${c.id}" placeholder="আপনার উত্তর লিখুন..." rows="2" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
                            <div id="reply-form-${c.id}" class="hidden mt-4 space-y-3 relative">
                                <div id="mention-dropdown-${c.id}" class="absolute bottom-full left-0 w-full max-w-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-2xl hidden z-50 mb-2 overflow-hidden animate-in slide-in-from-bottom-2 duration-200"></div>
                                <textarea id="reply-input-${c.id}" oninput="handleMentionSearch(event, '${c.id}')" placeholder="আপনার উত্তর লিখুন..." rows="2" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
                                <div class="flex justify-end gap-2">
                                    <button onclick="toggleReplyForm('${c.id}')" class="px-4 py-2 text-xs font-bold text-zinc-500">বাতিল</button>
                                    <button id="reply-btn-${c.id}" onclick="submitCommentReply('${c.id}')" class="px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg shadow-md active:scale-95 transition-all">উত্তর পাঠান</button>
                                </div>
                            </div>

                            <!-- Replies Thread -->
                            <div class="space-y-4 mt-4">
                                ${c.comment_replies ? c.comment_replies.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).map(r => `
                                    <div class="flex gap-3 p-3 bg-zinc-50 dark:bg-zinc-800/30 rounded-2xl border border-zinc-100 dark:border-zinc-800 transition-all hover:bg-zinc-100/50">
                                        ${generateAvatarHtml(r.author, r.site_users?.profile_pic_url)}
                                        <div class="flex-1">
                                            <div class="flex justify-between items-center mb-1">
                                                <span class="font-black text-xs text-zinc-900 dark:text-white">${r.author}</span>
                                                <span class="text-[9px] font-bold text-zinc-500 uppercase">${new Date(r.created_at).toLocaleDateString('bn-BD')}</span>
                                            </div>
                                            <p class="text-sm text-zinc-700 dark:text-zinc-300 leading-relaxed">${formatContentWithMentions(r.content)}</p>
                                            <button onclick="toggleReplyForm('${c.id}', '${r.site_users?.username || ''}')" class="text-[9px] font-black text-zinc-500 hover:text-blue-600 uppercase mt-1">উত্তর দিন</button>
                                        </div>
                                    </div>
                                `).join('') : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<p class="text-red-500">মন্তব্য লোড করতে সমস্যা হয়েছে।</p>';
            }
        }

        document.getElementById('submit-comment').onclick = async () => {
            if (!user) {
                showToast('মন্তব্য করতে অনুগ্রহ করে আগে প্রবেশ করুন।', 'info');
                return;
            }

            const content = document.getElementById('comment-body').value;

            if (!content) {
                showToast('দয়া করে মন্তব্য লিখুন।', 'error');
                return;
            }

            const { error } = await supabase
                .from('comments')
                .insert([{ article_slug: slug, author: user.full_name, user_id: user.id, content }]);

            if (error) {
                showToast('মন্তব্য পোস্ট করা যায়নি।', 'error');
            } else {
                showToast('আপনার মন্তব্য যুক্ত করা হয়েছে!', 'success');
                document.getElementById('comment-body').value = '';
                fetchComments();
            }
        };

        // Reply System Logic
        window.toggleReplyForm = (commentId, mentionUsername) => {
            const form = document.getElementById(`reply-form-${commentId}`);
            const input = document.getElementById(`reply-input-${commentId}`);
            const dropdown = document.getElementById(`mention-dropdown-${commentId}`);
            
            if (mentionUsername) {
                const mentionTag = `@${mentionUsername} `;
                if (!input.value.includes(mentionTag)) {
                    input.value = mentionTag + input.value;
                }
                form.classList.remove('hidden');
            } else {
                form.classList.toggle('hidden');
            }

            if (dropdown) dropdown.classList.add('hidden');
            if (!form.classList.contains('hidden')) {
                input.focus();
            }
        };

        // Mention Dropdown Logic
        let mentionDebounce;
        window.handleMentionSearch = async (e, id) => {
            const input = e.target;
            const value = input.value;
            const cursor = input.selectionStart;
            const textBefore = value.substring(0, cursor);
            const match = textBefore.match(/@(\w*)$/);
            const dropdown = document.getElementById(id === 'main' ? 'mention-dropdown-main' : `mention-dropdown-${id}`);

            if (match) {
                const query = match[1];
                clearTimeout(mentionDebounce);
                mentionDebounce = setTimeout(async () => {
                    const { data, error } = await supabase
                        .from('site_users')
                        .select('username, full_name, profile_pic_url')
                        .ilike('username', `${query}%`)
                        .limit(5);

                    if (data && data.length > 0) {
                        dropdown.innerHTML = data.map(u => `
                            <div onclick="applyMention('${u.username}', '${id}')" class="flex items-center gap-3 p-3 hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer border-b border-zinc-100 dark:border-zinc-700 last:border-0 transition-colors">
                                ${generateAvatarHtml(u.full_name, u.profile_pic_url)}
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-black text-zinc-900 dark:text-white truncate">${u.full_name}</p>
                                    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">@${u.username}</p>
                                </div>
                            </div>
                        `).join('');
                        dropdown.classList.remove('hidden');
                    } else {
                        dropdown.classList.add('hidden');
                    }
                }, 300);
            } else {
                dropdown.classList.add('hidden');
            }
        };

        window.applyMention = (username, id) => {
            const input = document.getElementById(id === 'main' ? 'comment-body' : `reply-input-${id}`);
            const dropdown = document.getElementById(id === 'main' ? 'mention-dropdown-main' : `mention-dropdown-${id}`);
            const value = input.value;
            const cursor = input.selectionStart;
            const textBefore = value.substring(0, cursor);
            const textAfter = value.substring(cursor);
            const lastAt = textBefore.lastIndexOf('@');

            input.value = textBefore.substring(0, lastAt) + '@' + username + ' ' + textAfter;
            dropdown.classList.add('hidden');
            input.focus();
        };

        window.submitCommentReply = async (commentId) => {
            if (!user) {
                showToast('উত্তর দিতে অনুগ্রহ করে আগে প্রবেশ করুন।', 'info');
                return;
            }

            const input = document.getElementById(`reply-input-${commentId}`);
            const content = input.value.trim();
            const btn = document.getElementById(`reply-btn-${commentId}`);

            if (!content) {
                showToast('দয়া করে উত্তর লিখুন।', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'পাঠানো হচ্ছে...';

            const { error } = await supabase
                .from('comment_replies')
                .insert([{ comment_id: commentId, author: user.full_name, user_id: user.id, content }]);

            btn.disabled = false;
            btn.textContent = 'উত্তর পাঠান';

            if (error) {
                showToast('উত্তর পাঠানো যায়নি।', 'error');
            } else {
                showToast('আপনার উত্তর যুক্ত করা হয়েছে!', 'success');
                fetchComments();
            }
        };

        async function fetchArticle() {
            if (!slug) {
                showError();
                return;
            }

            try {
                const { data: article, error } = await supabase
                    .from('articles')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !article) throw error;

                // ভিউ ১ বাড়িয়ে দিন (সেশন ভিত্তিক চেক)
                const articleKey = `viewed_article_${article.id}`;
                if (!sessionStorage.getItem(articleKey)) {
                    const { error: rpcError } = await supabase.rpc('increment_article_views', { row_id: article.id });
                    if (!rpcError) {
                        sessionStorage.setItem(articleKey, 'true');
                        article.views = (article.views || 0) + 1;
                    }
                }
                renderArticle(article);
            } catch (err) {
                console.error('Supabase error:', err);
                showError();
            }
        }

        function renderArticle(article) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');

            document.title = `${article.title} - উইকিপিডিয়া.বাংলা`;
            document.getElementById('article-title').textContent = article.title;
            document.getElementById('article-category').textContent = article.category || 'সাধারণ';
            
            const imgEl = document.getElementById('article-image');
            imgEl.src = article.image_url || 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200';
            
            const date = new Date(article.created_at);
            document.getElementById('article-date').textContent = `${date.toLocaleDateString('bn-BD', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            })} • ${article.views || 0} ভিউ`;

            const content = article.content || article.excerpt || 'এই নিবন্ধটির কোনো বিস্তারিত তথ্য নেই।';
            const bodyContainer = document.getElementById('article-body');
            
            // Split by newline and wrap in p tags for clean Bengali typography
            bodyContainer.innerHTML = content
                .split('\n')
                .filter(p => p.trim() !== '')
                .map(p => `<p class="mb-8">${p}</p>`)
                .join('');
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-area').classList.remove('hidden');
        }

        fetchArticle();
    </script>
</body>
