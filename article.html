<!DOCTYPE html>
<html lang="bn" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধ - উইকিপিডিয়া.বাংলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Hind Siliguri"', 'sans-serif'] },
                    colors: { zinc: { 850: '#202022', 950: '#0c0c0e' } }
                }
            }
        }
    </script>
    <style>
        .glass { @apply bg-white/70 dark:bg-zinc-950/70 backdrop-blur-3xl border-zinc-200/50 dark:border-white/10; }
        .skeleton { @apply animate-pulse bg-zinc-200 dark:bg-zinc-800 rounded-xl; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen">

    <nav class="sticky top-0 z-50 h-16 border-b glass flex items-center px-4 lg:px-6 justify-between">
        <div onclick="window.location.href='index.html'" class="flex items-center gap-3 cursor-pointer">
            <div class="w-9 h-9 bg-zinc-900 dark:bg-white rounded-xl flex items-center justify-center">
                <span class="text-lg text-white dark:text-black font-bold">উ</span>
            </div>
            <span class="font-bold text-lg text-zinc-900 dark:text-white">উইকিপিডিয়া<span class="text-zinc-500">.বাংলা</span></span>
        </div>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 text-sm font-medium bg-zinc-100 dark:bg-zinc-900 rounded-xl hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">ফিরে যান</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6 lg:p-12 pb-24">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4 border-b border-zinc-200 dark:border-zinc-800 pb-0">
            <div class="flex items-center gap-1">
                <button id="tab-article" class="px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all">নিবন্ধ</button>
                <button id="tab-talk" class="px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">আলাপ</button>
            </div>
            <div class="flex items-center gap-1 mb-2 sm:mb-0">
                <button class="px-3 py-1.5 text-xs font-bold bg-zinc-100 dark:bg-zinc-900 rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">পড়ুন</button>
                <button class="px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">সম্পাদনা</button>
                <button class="px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors">ইতিহাস</button>
            </div>
        </div>

        <div id="loading" class="space-y-8">
            <div class="h-64 sm:h-[400px] skeleton w-full"></div>
            <div class="h-14 skeleton w-3/4"></div>
            <div class="space-y-4">
                <div class="h-4 skeleton w-full"></div>
                <div class="h-4 skeleton w-full"></div>
                <div class="h-4 skeleton w-5/6"></div>
            </div>
        </div>

        <article id="content-area" class="hidden space-y-10">
            <div class="relative rounded-3xl overflow-hidden shadow-2xl h-64 sm:h-[450px]">
                <img id="article-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950/80 to-transparent"></div>
            </div>

            <div class="space-y-6">
                <span id="article-category" class="px-4 py-1.5 bg-blue-600 text-white text-[10px] uppercase tracking-widest font-black rounded-full"></span>
                <h1 id="article-title" class="text-4xl sm:text-6xl font-black text-zinc-900 dark:text-white leading-tight"></h1>
                <div class="flex items-center gap-4 text-sm text-zinc-500 font-medium pb-8 border-b border-zinc-200 dark:border-zinc-800">
                    <span id="article-date"></span>
                    <span>•</span>
                    <span>উইকিপিডিয়া সম্পাদক</span>
                </div>
            </div>

            <div id="article-body" class="text-xl lg:text-2xl leading-[1.8] text-zinc-700 dark:text-zinc-300 font-light prose dark:prose-invert max-w-none">
                <!-- Article content -->
            </div>
        </article>

        <section id="talk-area" class="hidden space-y-10 animate-in fade-in duration-500">
            <div class="space-y-4">
                <h2 class="text-3xl font-black text-zinc-900 dark:text-white">আলোচনা পাতা</h2>
                <p class="text-zinc-500">এই নিবন্ধটি উন্নত করার বিষয়ে আপনার মতামত দিন।</p>
            </div>

            <div class="bg-white dark:bg-zinc-900/60 border border-zinc-200 dark:border-zinc-800/60 rounded-3xl p-6 space-y-4 backdrop-blur-md">
                <input type="text" id="comment-author" placeholder="আপনার নাম" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all">
                <textarea id="comment-body" placeholder="আপনার মন্তব্য লিখুন..." rows="4" class="w-full bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all"></textarea>
                <button id="submit-comment" class="w-full sm:w-auto px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">মন্তব্য জমা দিন</button>
            </div>

            <div id="comments-list" class="space-y-6 pt-6"></div>
        </section>

        <div id="error-area" class="hidden text-center py-20 space-y-6">
            <h2 class="text-3xl font-bold">নিবন্ধটি খুঁজে পাওয়া যায়নি</h2>
            <p class="text-zinc-500">সম্ভবত আইডি ভুল বা নিবন্ধটি মুছে ফেলা হয়েছে।</p>
            <button onclick="window.location.href='index.html'" class="px-8 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-500/20">মূল পাতায় ফিরে যান</button>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex flex-col gap-3 z-[300] w-full max-w-md px-4 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://ejawztjfekggwtlyymym.supabase.co';
        const supabaseKey = 'sb_publishable_qzyHuTPdiitg0FZE6XCA5g_orpm2TsH';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Toast Logic
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-500 translate-y-10 opacity-0 glass border pointer-events-auto`;
            
            let icon = '';
            let textColor = '';
            if (type === 'success') {
                icon = '<svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                textColor = 'text-emerald-600 dark:text-emerald-400';
            } else if (type === 'error') {
                icon = '<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
                textColor = 'text-red-600 dark:text-red-400';
            } else {
                icon = '<svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                textColor = 'text-blue-600 dark:text-blue-400';
            }

            toast.innerHTML = `
                <div class="flex-shrink-0">${icon}</div>
                <p class="font-bold text-sm ${textColor}">${message}</p>
            `;

            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        // Tab Switching Logic
        const tabArticle = document.getElementById('tab-article');
        const tabTalk = document.getElementById('tab-talk');
        const contentArea = document.getElementById('content-area');
        const talkArea = document.getElementById('talk-area');

        tabArticle.onclick = () => {
            tabArticle.className = 'px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all';
            tabTalk.className = 'px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors';
            contentArea.classList.remove('hidden');
            talkArea.classList.add('hidden');
        };

        tabTalk.onclick = () => {
            tabTalk.className = 'px-4 py-2 text-sm font-bold border-b-2 border-blue-500 text-blue-600 dark:text-blue-400 transition-all';
            tabArticle.className = 'px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition-colors';
            contentArea.classList.add('hidden');
            talkArea.classList.remove('hidden');
            fetchComments();
        };

        // Talk Section Functions
        async function fetchComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div class="skeleton h-24 w-full"></div>';
            
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('article_slug', slug)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    list.innerHTML = '<p class="text-center py-10 text-zinc-500">এখনও কোনো আলোচনা শুরু হয়নি। প্রথম মন্তব্যটি আপনি করুন!</p>';
                    return;
                }

                list.innerHTML = data.map(c => `
                    <div class="p-4 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-blue-600 dark:text-blue-400">${c.author}</span>
                            <span class="text-xs text-zinc-500">${new Date(c.created_at).toLocaleDateString('bn-BD')}</span>
                        </div>
                        <p class="text-zinc-700 dark:text-zinc-300 leading-relaxed">${c.content}</p>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<p class="text-red-500">মন্তব্য লোড করতে সমস্যা হয়েছে।</p>';
            }
        }

        document.getElementById('submit-comment').onclick = async () => {
            const author = document.getElementById('comment-author').value;
            const content = document.getElementById('comment-body').value;

            if (!author || !content) {
                showToast('দয়া করে নাম এবং মন্তব্য উভয়ই লিখুন।', 'error');
                return;
            }

            const { error } = await supabase
                .from('comments')
                .insert([{ article_slug: slug, author, content }]);

            if (error) {
                showToast('মন্তব্য পোস্ট করা যায়নি।', 'error');
            } else {
                showToast('আপনার মন্তব্য যুক্ত করা হয়েছে!', 'success');
                document.getElementById('comment-body').value = '';
                fetchComments();
            }
        };

        async function fetchArticle() {
            if (!slug) {
                showError();
                return;
            }

            try {
                const { data: article, error } = await supabase
                    .from('articles')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !article) throw error;
                renderArticle(article);
            } catch (err) {
                console.error('Supabase error:', err);
                showError();
            }
        }

        function renderArticle(article) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');

            document.title = `${article.title} - উইকিপিডিয়া.বাংলা`;
            document.getElementById('article-title').textContent = article.title;
            document.getElementById('article-category').textContent = article.category || 'সাধারণ';
            
            const imgEl = document.getElementById('article-image');
            imgEl.src = article.image_url || 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200';
            
            const date = new Date(article.created_at);
            document.getElementById('article-date').textContent = date.toLocaleDateString('bn-BD', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            const content = article.content || article.excerpt || 'এই নিবন্ধটির কোনো বিস্তারিত তথ্য নেই।';
            const bodyContainer = document.getElementById('article-body');
            
            // Split by newline and wrap in p tags for clean Bengali typography
            bodyContainer.innerHTML = content
                .split('\n')
                .filter(p => p.trim() !== '')
                .map(p => `<p class="mb-8">${p}</p>`)
                .join('');
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-area').classList.remove('hidden');
        }

        fetchArticle();
    </script>
</body>
</html>
